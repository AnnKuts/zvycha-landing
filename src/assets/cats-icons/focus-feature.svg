<svg width="496" height="496" viewBox="0 0 496 496" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
  .thought-bubble {
    animation: thought-appear 5s ease-in-out infinite;
    transform-origin: center;
  }
  .thought-bubble-dot-1 {
    animation: thought-appear 5s ease-in-out infinite;
    animation-delay: 0.2s;
  }
  .thought-bubble-dot-2 {
    animation: thought-appear 5s ease-in-out infinite;
    animation-delay: 0.1s;
  }
  @keyframes thought-appear {
    0% {
      opacity: 0;
      transform: scale(0.5);
    }
    10% {
      opacity: 1;
      transform: scale(1.05);
    }
    15% {
      transform: scale(1);
    }
    70% {
      opacity: 1;
      transform: scale(1);
    }
    85% {
      opacity: 0;
      transform: scale(0.8);
    }
    100% {
      opacity: 0;
      transform: scale(0.5);
    }
  }
</style>
